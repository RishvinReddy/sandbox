<!-- ANIMATION STYLES LIBRARY -->
<!-- Copy this entire <style> block to add animations to any page -->

<style type="text/tailwindcss">
  @layer base {
    html {
      scroll-behavior: smooth;
    }
  }
  @layer utilities {
    /* Fade Animations */
    .animate-fade-in {
      animation: fadeIn 1s ease-in-out;
    }
    .animate-fade-in-slow {
      animation: fadeIn 2s ease-in-out;
    }
    .animate-fade-in-fast {
      animation: fadeIn 0.5s ease-in-out;
    }
    
    /* Slide Animations */
    .animate-slide-up {
      animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .animate-slide-down {
      animation: slideDown 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .animate-slide-left {
      animation: slideLeft 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .animate-slide-right {
      animation: slideRight 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    
    /* Scale Animations */
    .animate-scale-in {
      animation: scaleIn 0.6s ease-out;
    }
    .animate-scale-up-in {
      animation: scaleUpIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    /* Bounce Animations */
    .animate-bounce-in {
      animation: bounceIn 0.8s cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    
    /* Glow/Pulse Animations */
    .animate-glow {
      animation: glow 2s ease-in-out infinite;
    }
    .animate-pulse-intense {
      animation: pulseIntense 2s ease-in-out infinite;
    }
    
    /* Rotate Animations */
    .animate-rotate-in {
      animation: rotateIn 0.6s ease-out;
    }
    .animate-spin-slow {
      animation: spin 3s linear infinite;
    }
    
    /* Flip Animations */
    .animate-flip-in {
      animation: flipIn 0.6s ease-out;
    }
    
    /* Blur Animations */
    .animate-blur-in {
      animation: blurIn 0.8s ease-out;
    }
    
    /* Keyframes */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    @keyframes slideDown {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    @keyframes slideLeft {
      from {
        transform: translateX(-30px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideRight {
      from {
        transform: translateX(30px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes scaleIn {
      from {
        transform: scale(0.9);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    @keyframes scaleUpIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    @keyframes bounceIn {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      70% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }
    
    @keyframes glow {
      0%, 100% {
        box-shadow: 0 0 5px rgba(242, 13, 70, 0.3);
      }
      50% {
        box-shadow: 0 0 20px rgba(242, 13, 70, 0.6);
      }
    }
    
    @keyframes pulseIntense {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }
    
    @keyframes rotateIn {
      from {
        transform: rotate(-10deg) scale(0.9);
        opacity: 0;
      }
      to {
        transform: rotate(0) scale(1);
        opacity: 1;
      }
    }
    
    @keyframes flipIn {
      from {
        transform: perspective(400px) rotateY(90deg);
        opacity: 0;
      }
      to {
        transform: perspective(400px) rotateY(0);
        opacity: 1;
      }
    }
    
    @keyframes blurIn {
      from {
        filter: blur(10px);
        opacity: 0;
      }
      to {
        filter: blur(0);
        opacity: 1;
      }
    }
    
    /* Stagger delays */
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .delay-500 { animation-delay: 0.5s; }
    .delay-600 { animation-delay: 0.6s; }
    .delay-700 { animation-delay: 0.7s; }
    .delay-800 { animation-delay: 0.8s; }
    
    /* Hover effects */
    .hover-lift {
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(242, 13, 70, 0.2);
    }
    
    .hover-glow {
      transition: all 0.3s ease;
    }
    .hover-glow:hover {
      box-shadow: 0 0 15px rgba(242, 13, 70, 0.5);
      color: #f20d46;
    }
    
    .hover-scale {
      transition: transform 0.3s ease;
    }
    .hover-scale:hover {
      transform: scale(1.05);
    }
    
    .hover-rotate {
      transition: transform 0.3s ease;
    }
    .hover-rotate:hover {
      transform: rotate(5deg);
    }
  }
</style>
